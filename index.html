<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur d'IMC - Service Express</title>
    
    <!-- Script Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1805732481707409" crossorigin="anonymous"></script>

    <style>
        :root { --primary: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #333; margin-bottom: 1.5rem; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1.1rem; font-weight: bold; margin-top: 10px; }
        #resultArea { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
        .imc-value { font-size: 2rem; font-weight: bold; display: block; }
        .imc-status { font-size: 1.2rem; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Calcul d'IMC</h1>
    
    <div class="input-group">
        <label>Taille (cm)</label>
        <input type="number" id="height" placeholder="Ex: 175" required>
    </div>
    
    <div class="input-group">
        <label>Poids (kg)</label>
        <input type="number" id="weight" placeholder="Ex: 70" required>
    </div>

    <button onclick="calculateIMC()">Calculer mon IMC</button>

    <div id="resultArea">
        <span class="imc-value" id="imcVal"></span>
        <div class="imc-status" id="imcStatus"></div>
    </div>

    <!-- Zone AdSense -->
    <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-1805732481707409"
             data-ad-slot="auto"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>
    </div>
</div>

<script>
    function calculateIMC() {
        const h = document.getElementById('height').value / 100;
        const w = document.getElementById('weight').value;
        const resArea = document.getElementById('resultArea');
        
        if(h > 0 && w > 0) {
            const imc = (w / (h * h)).toFixed(1);
            document.getElementById('imcVal').innerText = imc;
            
            let status = "";
            let color = "";
            
            if(imc < 18.5) { status = "Insuffisance pondérale"; color = "#ffc107"; }
            else if(imc < 25) { status = "Poids normal"; color = "#28a745"; }
            else if(imc < 30) { status = "Surpoids"; color = "#fd7e14"; }
            else { status = "Obésité"; color = "#dc3545"; }
            
            const s = document.getElementById('imcStatus');
            s.innerText = status;
            resArea.style.display = "block";
            resArea.style.backgroundColor = color + "22";
            resArea.style.color = color;
        }
    }
</script>
<footer style="margin-top: 50px; font-size: 0.8rem; text-align: center;">
    <p>
        <a href="about.html" style="color: #666; margin: 0 10px;">À propos</a> | 
        <a href="privacy.html" style="color: #666; margin: 0 10px;">Confidentialité</a>
    </p>
    <p>&copy; 2026 Service Express</p>
</footer>
</body>
</html>
