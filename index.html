<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcul IMC - Service Express</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1805732481707409" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Inter', sans-serif; background: radial-gradient(circle at top, #0f172a, #020617); color:white; display:flex; flex-direction: column; align-items:center; min-height:100vh; padding: 20px; }
        .container { width:100%; max-width:420px; padding:30px; border-radius:24px; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); box-shadow: 0 0 50px rgba(99,102,241,0.25); text-align:center; margin-bottom: 30px; }
        h1 { margin-bottom:10px; font-size: 1.8rem; }
        .subtitle { color:#94a3b8; font-size:14px; margin-bottom:20px; }
        label { display:block; margin-top:20px; font-size:14px; color:#cbd5e1; text-align:left; }
        input { width:100%; padding:14px; margin-top:10px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:#0f172a; color:white; box-sizing: border-box; outline: none; }
        button { width:100%; padding:14px; margin-top:20px; border-radius:12px; border:none; background: linear-gradient(90deg,#6366f1,#8b5cf6); color:white; font-weight:600; cursor:pointer; transition:0.2s; }
        button:hover { transform: scale(1.02); }
        .result { margin-top:25px; padding: 15px; border-radius: 12px; background: rgba(99,102,241,0.1); display: none; }
        .result span { display:block; font-size:24px; font-weight:700; color:#a78bfa; }
        .ad-slot { margin: 20px 0; min-height: 100px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .seo-content { text-align: left; margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .seo-content h2 { font-size: 1.1rem; color: #a78bfa; margin-top: 20px; }
        .seo-content p { font-size: 0.9rem; color: #94a3b8; line-height: 1.5; }
        footer { margin-top: auto; padding: 20px; font-size: 0.8rem; text-align: center; color: #64748b; }
        footer a { color:#94a3b8; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>⚖️ Calcul d'IMC</h1>
    <p class="subtitle">Surveillez votre santé en un clin d'œil</p>

    <div class="ad-slot">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1805732481707409" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <label>Taille (cm)</label>
    <input type="number" id="h" placeholder="Ex: 175">
    <label>Poids (kg)</label>
    <input type="number" id="w" placeholder="Ex: 70">
    <button onclick="calc()">Calculer mon IMC</button>
    <div class="result" id="res"></div>

    <div class="seo-content">
        <h2>Comprendre son IMC</h2>
        <p>L'Indice de Masse Corporelle est un indicateur fiable pour évaluer les risques liés au surpoids ou à la maigreur. Un score entre 18.5 et 25 est considéré comme normal.</p>
    </div>
</div>
<script>
    function calc() {
        const h = document.getElementById('h').value / 100;
        const w = document.getElementById('w').value;
        const res = document.getElementById('res');
        if(h && w) {
            const imc = (w / (h*h)).toFixed(1);
            res.style.display = "block";
            res.innerHTML = "Votre IMC : <span>" + imc + "</span>";
        }
    }
</script>
<footer>
    <p><a href="about.html">À propos</a> | <a href="privacy.html">Confidentialité</a></p>
    <p>&copy; 2026 Service Express</p>
</footer>
</body>
</html>
